<section>
        <article>
            <h3>Formulario de Inscripción - Curso Senati</h3>
            <form id="formSenati" action="" method="post">
            <label>Nombre completo:</label>
            <input type="text" id="nombre" placeholder="Ingresa tu nombre"><br><br>

            <label>DNI:</label>
            <input type="text" id="dni" placeholder="Número de documento"><br><br>

            <label>Correo electrónico:</label>
            <input type="email" id="correo" placeholder="ejemplo@correo.com"><br><br>

            <label>Teléfono:</label>
            <input type="tel" id="telefono" placeholder="Número de contacto"><br><br>

            <label>Curso a inscribirse:</label>
            <select id="curso">
            <option value="">Seleccione un curso</option>
            <option value="programacion">Programación Web</option>
            <option value="redes">Redes y Telecomunicaciones</option>
            <option value="mecanica">Mecánica Automotriz</option>
            <option value="electronica">Electrónica Industrial</option>
            </select><br><br>

            <button type="submit">Inscribirse</button>
            <button type="reset">Borrar</button>
            </form>
            <p id="respuestaSenati">Aquí aparecerá la confirmación</p>
        </article>
